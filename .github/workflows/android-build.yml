name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 & Build Tools 35.0.0
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper (if missing)
        run: gradle wrapper --gradle-version 8.9

      - name: Create local.properties
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        run: |
          # SDK dir is provided by setup-android via ANDROID_SDK_ROOT.
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          # Optional API token. If the secret is missing, use the placeholder so
          # the app falls back to demo data. The token is NEVER printed to logs.
          if [ -n "${FOOTBALL_DATA_API_TOKEN}" ]; then
            echo "FOOTBALL_DATA_API_TOKEN=${FOOTBALL_DATA_API_TOKEN}" >> local.properties
          else
            echo "FOOTBALL_DATA_API_TOKEN=your_api_token_here" >> local.properties
          fi
          echo "FOOTBALL_API_BASE_URL=https://api.football-data.org/v4" >> local.properties
          echo "local.properties created (token value hidden)."

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing. A real PKCS12 keystore is required for a signed release build."
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.p12"
          echo "Keystore decoded to ${RUNNER_TEMP}/release.p12"

      - name: Build signed release APK and AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      - name: Verify release APK signature
        run: |
          APK=$(find app/build/outputs/apk/release -name "*-release.apk" | head -n 1)
          if [ -z "${APK}" ]; then
            echo "::error::No release APK found."
            exit 1
          fi
          APKSIGNER=$(find "${ANDROID_SDK_ROOT}/build-tools/35.0.0" -name apksigner | head -n 1)
          echo "Using apksigner: ${APKSIGNER}"
          CERTS=$("${APKSIGNER}" verify --print-certs "${APK}")
          echo "${CERTS}"
          if echo "${CERTS}" | grep -q "CN=Android Debug"; then
            echo "::error::Release APK is signed with the DEBUG certificate. Google Play would reject this."
            exit 1
          fi
          echo "Signature check passed: release artifact is not debug-signed."

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: matchplan-coach-release-apk
          path: app/build/outputs/apk/release/*-release.apk
          if-no-files-found: error

      - name: Upload release AAB (Google Play upload target)
        uses: actions/upload-artifact@v4
        with:
          name: matchplan-coach-release-aab
          path: app/build/outputs/bundle/release/*-release.aab
          if-no-files-found: error
